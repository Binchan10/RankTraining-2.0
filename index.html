<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무제한 수련장</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 제작자 표기 -->
    <div id="made-by">Created by Divide</div>

    <!-- ─── 인트로 / 메인 메뉴 ─────────────────────────── -->
    <div id="intro">
        <h1>무제한 수련장</h1>
        <div class="intro-version">v2.0</div>
        <div class="intro-sub">Typing Training</div>

        <div id="menu">
            <!-- 수련 시간 -->
            <select id="time">
                <option value="60">수련 시간: 1분</option>
                <option value="120">수련 시간: 2분</option>
            </select>

            <!-- 목표 속도 -->
            <select id="speed">
                <option value="300">목표 속도: 300타</option>
                <option value="400">목표 속도: 400타</option>
                <option value="500">목표 속도: 500타</option>
                <option value="600">목표 속도: 600타</option>
                <option value="700">목표 속도: 700타</option>
                <option value="800">목표 속도: 800타</option>
                <option value="900">목표 속도: 900타</option>
                <option value="1000" selected>목표 속도: 1000타</option>
                <option value="1100">목표 속도: 1100타</option>
                <option value="1200">목표 속도: 1200타</option>
            </select>

            <button type="button" id="settingsToggle" class="settings-toggle" aria-expanded="false" aria-controls="settingsPanel">
                <span class="settings-toggle-inner">
                    <span class="settings-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                            <line x1="4" y1="6" x2="14" y2="6"></line>
                            <circle cx="18" cy="6" r="2"></circle>
                            <line x1="4" y1="12" x2="10" y2="12"></line>
                            <circle cx="14" cy="12" r="2"></circle>
                            <line x1="4" y1="18" x2="16" y2="18"></line>
                            <circle cx="20" cy="18" r="2"></circle>
                        </svg>
                    </span>
                    <span>추가 설정</span>
                </span>
            </button>

            <div id="settingsPanel" class="settings-panel" hidden>
                <!-- 게임 옵션 -->
                <div class="option-group">
                    <div class="option-label">Options</div>
                    <label class="option-item">
                        <input type="checkbox" id="optFlip">
                        <span>Side Swap</span>
                    </label>
                    <label class="option-item">
                        <input type="checkbox" id="optEasy">
                        <span>Easy Mode</span>
                    </label>
                    <label class="option-item">
                        <input type="checkbox" id="optMute">
                        <span>Mute</span>
                    </label>
                </div>

                <!-- 환경 설정 -->
                <div class="setting-group">
                    <div class="option-label">Settings</div>

                    <!-- 배경 이미지 -->
                    <div class="setting-item">
                        <div class="setting-label">배경 이미지</div>
                        <div class="setting-row">
                            <input type="file" id="bgFile" accept="image/*">
                            <button type="button" id="bgClear" class="mini-btn">제거</button>
                        </div>
                        <div id="bgStatus" class="setting-help">선택된 이미지 없음</div>
                    </div>

                    <!-- 색상 프리셋 -->
                    <div class="setting-item">
                        <label class="setting-label" for="colorPreset">판 색상 프리셋</label>
                        <select id="colorPreset">
                            <option value="classic">클래식</option>
                            <option value="aurora">오로라</option>
                            <option value="solar">솔라</option>
                            <option value="forest">포레스트</option>
                            <option value="mono">모노</option>
                        </select>
                    </div>
                </div>
            </div>

            <button id="startBtn">수련 시작</button>
        </div>
    </div>

    <!-- ─── 게임 HUD ──────────────────────────────────── -->
    <div id="timer"></div>

    <div id="timeGaugeWrap">
        <div id="timeGaugeBg">
            <div id="timeGaugeFill"></div>
        </div>
    </div>

    <div id="liveCount"></div>

    <!-- 카운트다운 오버레이 -->
    <div id="countdown"></div>

    <!-- ─── 타일 그리드 ───────────────────────────────── -->
    <div class="grid" id="grid"></div>

    <!-- ─── 하단 입력 바 ──────────────────────────────── -->
    <div class="bottom" id="bottom" style="display:none">
        <input id="input" class="input" autocomplete="off" placeholder="단어를 입력하세요">
    </div>

    <!-- ─── 결과창 ────────────────────────────────────── -->
    <div id="result">
        <div class="result-inner">
            <div class="result-left">
                <div id="winLoss"></div>
                <div id="rank"></div>
                <div id="modeBadge">
                    <div class="badge-dot"></div>
                    <span id="modeLabel"></span>
                </div>
                <div id="scoreDetail"></div>
                <div id="accuracyDetail"></div>
                <button class="retry-btn" onclick="location.reload()">처음으로</button>
            </div>
            <div class="result-right">
                <div class="chart-title">구간별 정타 수</div>
                <canvas id="chartCanvas"></canvas>
            </div>
        </div>
    </div>

    <!-- ─── JavaScript — 의존성 순서대로 로드 ────────── -->
    <!--
        로드 순서:
        1. config.js   — WORDS, COLOR_PRESETS, FLIP_DURATION, getRank (공유 상수)
        2. audio.js    — audioCtx, playSuccessSound, playFlipSound
        3. settings.js — LS, applyColorPreset, applyBackgroundImage, loadSettings, initSettingsListeners
        4. ui.js       — renderAll, updateTimerDisplay, updateGauge, updateLiveCount, runCountdown, showGameUI, hideIntro
        5. result.js   — showResult, drawChart  (getRank는 config.js에서 제공)
        6. game.js     — prep, start, end, enemy, flip, initGameListeners (위 모두 참조)
    -->
    <script src="js/config.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/result.js"></script>
    <script src="js/game.js"></script>

    <!-- 초기화 — 모든 모듈 로드 후 실행 -->
    <script>
        loadSettings();
        initSettingsListeners();
        initSettingsPanel();
        initGameListeners();
    </script>
</body>
</html>
