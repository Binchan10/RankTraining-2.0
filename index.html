<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무제한 수련장</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 프리미엄 설정 모달 -->
    <div id="settingsOverlay" class="settings-overlay">
        <div id="settingsModal" class="settings-modal">
            <div class="settings-header">
                <h2>환경 설정</h2>
                <button id="settingsClose" class="settings-close-btn" aria-label="닫기">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="settings-body">
                <div class="setting-group-v2">
                    <div class="option-label">게임 옵션</div>
                    <div class="settings-grid">
                        <label class="option-item-v2">
                            <span>사이드 스왑 (Side Swap)</span>
                            <div class="toggle-switch-wrapper">
                                <input type="checkbox" id="optFlip" class="toggle-input">
                                <div class="toggle-switch"></div>
                            </div>
                        </label>
                        <label class="option-item-v2">
                            <span>이지 모드 (Easy Mode)</span>
                            <div class="toggle-switch-wrapper">
                                <input type="checkbox" id="optEasy" class="toggle-input">
                                <div class="toggle-switch"></div>
                            </div>
                        </label>
                        <label class="option-item-v2">
                            <span>음소거 (Mute)</span>
                            <div class="toggle-switch-wrapper">
                                <input type="checkbox" id="optMute" class="toggle-input">
                                <div class="toggle-switch"></div>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="setting-group-v2">
                    <div class="option-label">디자인 & 배경</div>
                    
                    <div class="setting-item-v2">
                        <label class="setting-label" for="colorPreset">판 색상 프리셋</label>
                        <div class="custom-select-wrapper">
                            <select id="colorPreset" class="premium-select">
                                <option value="classic">클래식 (Classic)</option>
                                <option value="aurora">오로라 (Aurora)</option>
                                <option value="solar">솔라 (Solar)</option>
                                <option value="forest">포레스트 (Forest)</option>
                                <option value="mono">모노 (Mono)</option>
                            </select>
                        </div>
                    </div>

                    <div class="setting-item-v2">
                        <div class="setting-label">배경 이미지</div>
                        <div class="setting-row-v2">
                            <label for="bgFile" class="file-upload-btn">이미지 선택</label>
                            <input type="file" id="bgFile" accept="image/*" style="display:none;">
                            <button type="button" id="bgClear" class="danger-btn">제거</button>
                        </div>
                        <div id="bgStatus" class="setting-help">선택된 이미지 없음</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 설정 톱니바퀴 버튼 -->
    <button type="button" id="settingsToggle" class="premium-gear-btn" aria-label="설정">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
    </button>

    <!-- 제작자 표기 -->
    <div id="made-by">Created by Divide</div>

    <!-- ─── 인트로 / 메인 메뉴 ─────────────────────────── -->
    <div id="intro">
        <h1>무제한 수련장</h1>
        <div class="intro-version">v2.0</div>
        <div class="intro-sub">Typing Training</div>

        <div id="menu">
            <!-- 수련 시간 -->
            <select id="time">
                <option value="60">수련 시간: 1분</option>
                <option value="120">수련 시간: 2분</option>
            </select>

            <!-- 목표 속도 -->
            <select id="speed">
                <option value="300">목표 속도: 300타</option>
                <option value="400">목표 속도: 400타</option>
                <option value="500">목표 속도: 500타</option>
                <option value="600">목표 속도: 600타</option>
                <option value="700">목표 속도: 700타</option>
                <option value="800">목표 속도: 800타</option>
                <option value="900">목표 속도: 900타</option>
                <option value="1000" selected>목표 속도: 1000타</option>
                <option value="1100">목표 속도: 1100타</option>
                <option value="1200">목표 속도: 1200타</option>
            </select>

            <!-- 설정 버튼과 패널은 모달로 이동됨 -->

            <button id="startBtn">수련 시작</button>
        </div>
    </div>

    <!-- ─── 게임 HUD ──────────────────────────────────── -->
    <div id="timer"></div>

    <div id="timeGaugeWrap">
        <div id="timeGaugeBg">
            <div id="timeGaugeFill"></div>
        </div>
    </div>

    <div id="liveCount"></div>

    <!-- 카운트다운 오버레이 -->
    <div id="countdown"></div>

    <!-- ─── 타일 그리드 ───────────────────────────────── -->
    <div class="grid" id="grid"></div>

    <!-- ─── 하단 입력 바 ──────────────────────────────── -->
    <div class="bottom" id="bottom" style="display:none">
        <input id="input" class="input" autocomplete="off" placeholder="단어를 입력하세요">
    </div>

    <!-- ─── 결과창 ────────────────────────────────────── -->
    <div id="result">
        <div class="result-inner">
            <div class="result-left">
                <div id="winLoss"></div>
                <div id="rank"></div>
                <div id="modeBadge">
                    <div class="badge-dot"></div>
                    <span id="modeLabel"></span>
                </div>
                <div id="scoreDetail"></div>
                <div id="accuracyDetail"></div>
                <button class="retry-btn" onclick="location.reload()">처음으로</button>
            </div>
            <div class="result-right">
                <div class="chart-title">구간별 정타 수</div>
                <canvas id="chartCanvas"></canvas>
            </div>
        </div>
    </div>

    <!-- ─── JavaScript — 의존성 순서대로 로드 ────────── -->
    <!--
        로드 순서:
        1. config.js   — WORDS, COLOR_PRESETS, FLIP_DURATION, getRank (공유 상수)
        2. audio.js    — audioCtx, playSuccessSound, playFlipSound
        3. settings.js — LS, applyColorPreset, applyBackgroundImage, loadSettings, initSettingsListeners
        4. ui.js       — renderAll, updateTimerDisplay, updateGauge, updateLiveCount, runCountdown, showGameUI, hideIntro
        5. result.js   — showResult, drawChart  (getRank는 config.js에서 제공)
        6. game.js     — prep, start, end, enemy, flip, initGameListeners (위 모두 참조)
    -->
    <script src="js/config.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/result.js"></script>
    <script src="js/game.js"></script>

    <!-- 초기화 — 모든 모듈 로드 후 실행 -->
    <script>
        loadSettings();
        initSettingsListeners();
        initSettingsPanel();
        initGameListeners();
    </script>
</body>
</html>
